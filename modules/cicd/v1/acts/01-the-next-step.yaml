id: act-1
title: "The Next Step"
act_number: 1

narrative: >
  The stack is running. Five services, named volumes, named network.
  Gitea at localhost:3000. Woodpecker at localhost:8000.

  You open Woodpecker.

  There are no pipelines.
  There are no repositories.
  There is nothing.

  The stack is infrastructure. This is what you build on it.

tasks:
  - id: task-1-1
    title: "Connect Gitea to Woodpecker"
    xp: 100
    checks:
      - type: regex_output
        command: "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000"
        pattern: "200|302"
        failure_message: "Woodpecker not responding at localhost:8000 — is the stack running?"
    hints:
      - "In Gitea: Settings → Applications → OAuth2 Applications — create one named 'woodpecker' with redirect URI http://localhost:8000/authorize"
      - "Copy the client ID and secret, add to stack/.env as WOODPECKER_GITEA_CLIENT and WOODPECKER_GITEA_SECRET"
      - "Restart woodpecker-server: docker compose -f stack/docker-compose.yml restart woodpecker-server — then log in at localhost:8000"

  - id: task-1-2
    title: "Create the application repository"
    xp: 100
    checks:
      - type: regex_output
        command: "curl -s http://localhost:3000/api/v1/repos/search?q=payment-dashboard -H \"Authorization: token ${GITEA_ADMIN_TOKEN:-}\" | python3 -c \"import sys,json; repos=json.load(sys.stdin); print('ok' if repos.get('data') else 'missing')\" 2>/dev/null || echo 'check-manually'"
        pattern: "ok|check-manually"
        failure_message: "payment-dashboard repo not found in Gitea — create it and push the code"
    hints:
      - "Create the repo in Gitea UI: localhost:3000 → + New Repository → payment-dashboard"
      - "Push from Module 4: cd ~/finstack/payment-dashboard && git remote add gitea http://localhost:3000/<username>/payment-dashboard.git && git push gitea main"
      - "Activate in Woodpecker: localhost:8000 → + → find payment-dashboard → activate"

  - id: task-1-3
    title: "Write the pipeline"
    xp: 150
    checks:
      - type: file_match
        path: "payment-dashboard/.woodpecker.yml"
        contains: "localhost:5000/payment-dashboard"
        failure_message: ".woodpecker.yml not found or not pushing to local registry"
    hints:
      - "Create payment-dashboard/.woodpecker.yml with three steps: lint, build, push"
      - "CI_COMMIT_SHA is a built-in Woodpecker variable — the commit hash that triggered the pipeline"
      - "Each step runs in its own container. Specify image: for each step."

  - id: task-1-4
    title: "Push and watch"
    xp: 50
    checks:
      - type: exit_code
        command: "git -C payment-dashboard log --oneline -- .woodpecker.yml | head -1"
        expected_exit: 0
        failure_message: ".woodpecker.yml not committed — run: git add .woodpecker.yml && git commit && git push gitea main"
    hints:
      - "git add .woodpecker.yml && git commit -m 'ci: add woodpecker pipeline' && git push gitea main"
      - "Open Woodpecker at localhost:8000 — a pipeline run should appear within seconds"
      - "The pipeline will fail. That's expected. Read the failing step output before moving on."

decision:
  prompt: >
    The pipeline failed on its first run. Before you look at the error,
    what's your instinct about what caused it?
  options:
    - id: option-a
      label: "A dependency that exists on my machine but not in the pipeline container"
      narrative: >
        Alex: "That's the most common cause of first-run failures.
        Your machine has years of globally installed tools.
        The pipeline has only what you declare. Good instinct.
        Now read the actual error and confirm."
      tracker_effects:
        morale_delta: 10
        debt_delta: 0
        severity_change: ""

    - id: option-b
      label: "A path or working directory issue"
      narrative: >
        Also extremely common. Pipeline containers don't know where
        your project lives unless you tell them. Alex: "Read the error.
        It'll tell you which one it is. Could be either."
      tracker_effects:
        morale_delta: 5
        debt_delta: 0
        severity_change: ""

    - id: option-c
      label: "Something wrong with my .woodpecker.yml syntax"
      narrative: >
        Possible — but YAML syntax errors surface immediately as a
        parse failure, not a step failure. If a step is running and
        then failing, the syntax is probably fine.
        Alex: "Look at which step failed. Then read its output."
      tracker_effects:
        morale_delta: 0
        debt_delta: 0
        severity_change: ""
